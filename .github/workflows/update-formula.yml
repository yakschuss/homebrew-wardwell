name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        env:
          VERSION: ${{ github.event.client_payload.version }}
          ARM64_SHA: ${{ github.event.client_payload.arm64_sha }}
          X86_64_SHA: ${{ github.event.client_payload.x86_64_sha }}
          LINUX_SHA: ${{ github.event.client_payload.linux_sha }}
        run: |
          cat > Formula/wardwell.rb << 'RUBY'
          class Wardwell < Formula
            desc "Persistent project memory for Claude Code — MCP server + CLI"
            homepage "https://wardwell.dev"
            version "VERSION_PLACEHOLDER"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/yakschuss/wardwell/releases/download/v#{version}/wardwell-aarch64-apple-darwin.tar.gz"
                sha256 "ARM64_SHA_PLACEHOLDER"
              else
                url "https://github.com/yakschuss/wardwell/releases/download/v#{version}/wardwell-x86_64-apple-darwin.tar.gz"
                sha256 "X86_64_SHA_PLACEHOLDER"
              end
            end

            on_linux do
              url "https://github.com/yakschuss/wardwell/releases/download/v#{version}/wardwell-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "LINUX_SHA_PLACEHOLDER"
            end

            def install
              bin.install "wardwell"
            end

            test do
              assert_match "wardwell", shell_output("#{bin}/wardwell --version")
            end
          end
          RUBY

          sed -i "s/VERSION_PLACEHOLDER/$VERSION/" Formula/wardwell.rb
          sed -i "s/ARM64_SHA_PLACEHOLDER/$ARM64_SHA/" Formula/wardwell.rb
          sed -i "s/X86_64_SHA_PLACEHOLDER/$X86_64_SHA/" Formula/wardwell.rb
          sed -i "s/LINUX_SHA_PLACEHOLDER/$LINUX_SHA/" Formula/wardwell.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/wardwell.rb
          git commit -m "Update wardwell to ${{ github.event.client_payload.version }}"
          git push
